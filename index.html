    <div id="debug-log-console" style="background: #fee2e2; color: #991b1b; padding: 10px; font-family: monospace; font-size: 12px; border: 1px solid #f87171; margin: 10px; display: none; white-space: pre-wrap; z-index: 9999; position: relative;"></div>
    <script>
        (function() {
            const debugDiv = document.getElementById('debug-log-console');
            function showDebug(msg, type) {
                debugDiv.style.display = 'block';
                debugDiv.textContent += '[' + type + '] ' + msg + '\n';
            }
            window.onerror = function(message, source, lineno, colno, error) {
                showDebug(message + ' at ' + source + ':' + lineno + ':' + colno, 'ERROR');
                return false;
            };
            window.addEventListener('unhandledrejection', function(event) {
                showDebug(event.reason, 'UNHANDLED REJECTION');
            });
            const origConsoleError = console.error;
            console.error = function() {
                origConsoleError.apply(console, arguments);
                const args = Array.from(arguments).map(a => {
                    if (a instanceof Error) {
                        return a.message + '\n' + a.stack;
                    }
                    if (a && typeof a === 'object') {
                        try {
                            const str = JSON.stringify(a);
                            return str === '{}' ? (a.message || a.toString()) : str;
                        } catch (e) {
                            return String(a);
                        }
                    }
                    return String(a);
                });
                showDebug(args.join(' '), 'CONSOLE.ERROR');
            };
        })();
    </script>

                };

                await window.Clerk.load({

                    signUpForceRedirectUrl: window.location.href
                });

                window.Clerk.addListener(function (state) {
                    if (state.user) {
                        document.getElementById('sign-in-container').style.display = 'none';
                        document.getElementById('app-content').style.display = 'block';

                        // Inizializza l'app React ora che il contenitore è visibile!
                        if (typeof window.initSimulatoreMilan === 'function') {
                            window.initSimulatoreMilan();
                        }
                    }
                });

                if (window.Clerk.user) {
                    // L'utente è autorizzato: nascondo il login e mostro il contenuto della web app
                    document.getElementById('sign-in-container').style.display = 'none';
                    document.getElementById('app-content').style.display = 'block';

                    // Inizializza l'app React ora che il contenitore è visibile!
                    if (typeof window.initSimulatoreMilan === 'function') {
                        window.initSimulatoreMilan();
                    }
                } else {
                    // L'utente NON è autorizzato: mostro il modulo di login nel div apposito
                    const signInDiv = document.getElementById('sign-in-container');
                    window.Clerk.mountSignIn(signInDiv, {
                        forceRedirectUrl: window.location.href,
                        fallbackRedirectUrl: window.location.href,
                        afterSignInUrl: window.location.href,
                        afterSignUpUrl: window.location.href,
                        localization: localizationObj
                    });
                }
            } catch (err) {
                console.error("Errore durante l'inizializzazione di Clerk: " + (err ? (err.message || err.stack || JSON.stringify(err) || String(err)) : "Errore sconosciuto"), err);
            }
        });
        document.body.appendChild(script);
    </script>
